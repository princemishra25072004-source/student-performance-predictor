<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>

    <!-- Bootstrap (for professional design) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fix favicon error -->
    <link rel="icon" href="data:,">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center text-primary">🎓 Student Predictor</h2>

        <form method="POST">

            <label>Study Hours</label>
            <input type="number" name="study_hours" class="form-control mb-3" required>

            <label>Attendance (%)</label>
            <input type="number" name="attendance" class="form-control mb-3" required>

            <label>Previous Marks</label>
            <input type="number" name="previous_marks" class="form-control mb-3" required>

            <button type="submit" class="btn btn-primary w-100">Predict</button>

        </form>

        {% if prediction %}
            <div class="mt-4 text-center">
                <h4>📊 Predicted Marks: {{ prediction }}</h4>

                {% if category == "Good" %}
                    <div class="alert alert-success">Excellent 🎉</div>
                {% elif category == "Average" %}
                    <div class="alert alert-warning">Average 🙂</div>
                {% else %}
                    <div class="alert alert-danger">Needs Improvement ⚠️</div>
                {% endif %}
            </div>
        {% endif %}

    </div>
</div>

</body>
</html>
